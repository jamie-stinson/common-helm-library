{{- $requiredMsg := include "common-helm-library.check-required-value" . -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ required (printf $requiredMsg "name") .Values.name | quote }}
  labels:
    {{- include "common-helm-library.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountToken | default true }}