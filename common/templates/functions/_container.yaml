{{- define "common-helm-library.functions.container" -}}
{{- $requiredMsg := include "common-helm-library.check-required-value" . -}}
- name: {{ required (printf $requiredMsg "name") .Values.name | quote }}
  image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
  {{- if .Values.container.command }}  
  command:
    {{- toYaml .Values.container.command | nindent 12 }}
  {{- end }}
  {{- if .Values.container.args }}
  args:
    {{- toYaml .Values.container.args | nindent 12 }}
  {{- end }}
  imagePullPolicy: {{ .Values.container.imagePullPolicy | default "Always" | quote }}
  securityContext:
    readOnlyRootFilesystem: {{ .Values.container.readOnlyRootFilesystem | default true }}
    allowPrivilegeEscalation: {{ .Values.container.allowPrivilegeEscalation | default false }}
  
  # Probes
  {{- if .Values.probe.startupProbe.enabled }}
  startupProbe:
    {{- include "common-helm-library.probes" .Values.probe.startupProbe }}
  {{- end }}

  {{- if .Values.probe.livenessProbe.enabled }}
  livenessProbe:
    {{- include "common-helm-library.probes" .Values.probe.livenessProbe }}
  {{- end }}

  {{- if .Values.probe.readinessProbe.enabled }}
  readinessProbe:
    {{- include "common-helm-library.probes" .Values.probe.readinessProbe }}
  {{- end }}

  volumeMounts:
  - mountPath: /tmp
    name: temp-dir
{{- end }}