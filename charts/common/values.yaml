# - This file shows the default values applied to all charts using the common helm library.
# - It shows all available possible values you can use in your chart, with some hashed out examples.

defaults:
  # - application name
  name: example
   # - type of application i.e deployment, statefulset
  type: deployment
   # - amount of replicas for type
  replicaCount: 1
   # - min ready time
  minReadySeconds: 0

  image:
    registry: docker.io
    repository: {}
    tag: {}

  container:
    command: {}
    args: {}
    imagePullPolicy: IfNotPresent

  resources: {}
    # requests:
    #   cpu: 10m
    #   memory: 10Mi
    # limits:
    #   cpu: 10m
    #   memory: 10Mi

  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    # - List of capabilities to add to the container
    # capabilities:
    # - NET_RAW
    privileged: false
    fsGroup: 1000
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    fsGroupChangePolicy: Always    

  rbac: {}
