# - This file shows the default values applied to all charts using the common helm library.
# - It shows all available possible values you can use in your chart, with some hashed out examples.

defaults:

  workload:
    enabled: false
    annotations: []
    labels: []

    ## Workload Type
    ## The value must Deployment, DaemonSet or StatefulSet (case sensitive)
    ##
    type: Deployment

    ## Number of replicas
    ##
    replicaCount: 1

    podManagementPolicy: OrderedReady
    strategy:
      type: RollingUpdate
      maxSurge: 1
      maxUnavailable: 1

  storage:
    enabled: false
    volumes: []
      ### emptyDir
      #
      # - name: my-emptydir-volume
      #   type: emptyDir
      #   mountPath: /path/to/mount/container
      #   sizeLimit: 1Gi
      #   readOnly: false
      #   ramDisk: false
      #
      ### hostPath
      #
      # - name: my-hostpath-volume
      #   type: hostPath
      #   mountPath: /path/to/mount/container
      #   hostPath: /path/to/mount/host
      #   readOnly: false
      #
      ### secret
      #
      # - name: my-secret-volume
      #   type: secret
      #   secretName: my-secret
      #   items:
      #     - key: key1
      #       path: /path/to/mount/container
      #
      ### configMap
      #
      # - name: my-configmap-volume
      #   type: configMap
      #   configMapName: my-configmap
      #   items:
      #     - key: key1
      #       path: /path/to/mount/container
      #
      ### downardAPI
      #
      # - name: my-downwardapi-volume
      #   type: downwardAPI
      #   items:
      #     - path: /path/to/mount/for/field1
      #       fieldRef:
      #         fieldPath: field1
      #
      ### pvc
      #
      # - name: my-pvc-volume
      #   type: pvc
      #   mountPath: /path/to/mount/container
      #   claimName: pv-1
      #   storageClassName: ""
      #   readOnly: false

      - name: test-pvc-template
        type: template
        mountPath: /path/to/mount/container
        storageClass: standard
        accessModes:
          - ReadWriteOnce
        size: 2Gi
        readOnly: false
        whenDeleted: Retain
        whenScaled: Retain


      - name: my-iscsi-volume
        type: iscsi
        mountPath: /path/to/mount/container
        portals: ['10.0.2.16:3260', '10.0.2.17:3260']
        targetPortal: 10.0.2.15:3260
        iqn: iqn.2001-04.com.example:storage.kube.sys1.xyz
        lun: 0
        fsType: ext4
        chapAuthDiscovery: true
        chapAuthSession: true
        secretRef:
          name: chap-secret
        readOnly: false




    persistentVolumes:
      - name: pv-1
        sizeLimit: 1Gi
        volumeMode: Filesystem
        accessModes:
          - ReadWriteMany
        mountOptions:
          - nfsvers=4.1
          - hard
          - sync
          - noac
          - nolock
        nfs:
          server: 10.10.10.10
          path: /mnt/test


  rbac:
    enabled: false
    type: ClusterRole #ClusterRole or Role
    rules:
      - apiGroups:
          - ""
        resources:
          - secrets
        verbs:
          - get
          - create
          - list
          - watch
          - update

  configMap:
    enabled: false
    annotations: []
    labels: []
    data: []

  serviceAccount:
    enabled: false
    annotations: []
    labels: []

  service:
    enabled: false
    annotations: []
    lablels: []
    type: ClusterIP
    loadBalancerIP: {}
    publishNotReadyAddresses: {}
    clusterIP: {}
    ports:
      - name: web
        protocol: TCP
        port: 80
      - name: test
        protocol: TCP
        port: 8000
        nodePort: 30050

  storageClass:
    enabled: false
    annotations: []
    lablels: []
    defaultClass: false
    reclaimPolicy: Delete
    allowVolumeExpansion: false
    volumeBindingMode: Immediate
    parameters: []
    mountOptions: []




