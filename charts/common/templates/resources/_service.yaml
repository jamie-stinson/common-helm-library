{{ define "common-helm-library.resources.service" }}
{{ if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
  labels:
    {{ include "common-helm-library.helpers.metadata.labels" $ | nindent 4 }}
    {{ if .Values.service.labels }}
    {{ toYaml .Values.service.labels | nindent 4 }}
    {{ end }}
  annotations:
    {{ include "common-helm-library.helpers.metadata.annotations" $ | nindent 4 }}
    {{ if .Values.service.annotations }}
    {{ toYaml .Values.service.annotations | nindent 4 }}
    {{ end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{ include "common-helm-library.helpers.metadata.selector-labels" $ | nindent 4 }}
  {{ if and (eq .Values.service.type "LoadBalancer") .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ .loadBalancerIP }}
  {{ end }}
  {{ if .Values.service.publishNotReadyAddresses }}
  publishNotReadyAddresses: {{ .Values.service.publishNotReadyAddresses }}
  {{ end }}
  {{ if and (eq .Values.service.type "ClusterIP") .Values.service.clusterIP }}
  clusterIP: {{ .Values.service.clusterIP}}
  {{ end }}
  {{ if .ports }}
  ports:
  {{ range .Values.service.ports }}
  - name: {{ .name }}
    protocol: {{ .protocol }}
    port: {{ .port }}
    targetPort: {{ .port }}
    {{- if and (eq .type "NodePort") .nodePort }}
    nodePort: {{ .nodePort }}
    {{ end }}
  {{ end }}
  {{ end }}
---
{{ end }}
{{ end }}