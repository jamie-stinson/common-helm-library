{{- define "common-helm-library.resources.clusterissuer" -}}
{{- if and (eq .Release.Name "traefik") .Values.tls.cloudflare }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: letsencrypt-production
  namespace: platform-ingress
spec:
  secretName: letsencrypt-production-certificate
  issuerRef:
    kind: ClusterIssuer
    name: cloudflare-letsencrypt-production
  commonName: {{ .Values.tls.cloudflare.commonName }}
  dnsNames:
    - {{ .Values.tls.cloudflare.commonName }}
---
{{- end }}
{{- end }}