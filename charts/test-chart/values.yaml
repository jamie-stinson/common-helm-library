services:
  - name: clusterip
    type: ClusterIP
    ports:
    - name: tcp
      protocol: TCP
      port: 3000
    - name: udp
      protocol: UDP
      port: 3001
    - name: strean
      protocol: SCTP
      port: 3002
  - name: clusterip-headless
    type: ClusterIP
    headless: true
    ports:
    - name: tcp
      protocol: TCP
      port: 3000
    - name: udp
      protocol: UDP
      port: 3001
    - name: strean
      protocol: SCTP
      port: 3002
  - name: clusterip-portless
    type: ClusterIP
    ports: {}
  - name: nodePort
    type: NodePort
    headless: false
    publishNotReadyAddresses: false
    loadBalancerIP: {}
    ports:
    - name: websecure
      protocol: TCP
      port: 443
      nodePort: 30050

probes:
  readinessProbe:
    type: "httpGet"
    path: "/health"
    port: 8096
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 2
    successThreshold: 1
    failureThreshold: 1
  livenessProbe:
    type: "httpGet"
    path: "/health"
    port: 8096
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 2
    successThreshold: 1
    failureThreshold: 3
  startupProbe:
    type: "httpGet"
    path: "/health"
    port: 8096
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 2
    successThreshold: 1
    failureThreshold: 3