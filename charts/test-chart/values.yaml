name: test-chart
namespace: business-application
strategy: Recreate
labels:
  team: tbc
  language: tbc
  category: tbc

image:
  repository: jellyfin/jellyfin
  tag: 10.9.4@sha256:e6b71e6cd18fa272ffaf5c376ac0db1113dab0bddf60e889a65eab05e17cfb73

ingress:
  public: false
  host: jellyfin.projectwhitebox.com
  port: 8096
  service: jellyfin

storage:
  - name: config
    type: emptyDir
    ramDisk: false
    size: 5Gi
    mountPath: /config
  - name: cache
    type: emptyDir
    ramDisk: false
    size: 5Gi
    mountPath: /cache
